version: '3.8'

# =============================================================================
# Production Docker Compose Configuration
# Uses pre-built images for production deployment
# =============================================================================

services:
  # ---------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: biaoxun-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biaoxun}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: biaoxun-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: biaoxun-backend
    restart: unless-stopped
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - POSTGRES_DB=${POSTGRES_DB:-biaoxun}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-biaoxun}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------
  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: biaoxun-celery
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    environment:
      - DEBUG=0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-biaoxun}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - static_files:/app/static
    depends_on:
      - db
      - redis
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Celery Beat (Scheduler)
  # ---------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: biaoxun-celery-beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-biaoxun}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - db
      - redis
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Frontend (Nginx)
  # ---------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: biaoxun-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend

  # ---------------------------------------------------------------------
  # Nginx Reverse Proxy (Optional - for HTTPS termination)
  # ---------------------------------------------------------------------
  # nginx-proxy:
  #   image: nginx:1.25-alpine
  #   container_name: biaoxun-nginx-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf.prod:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - backend

# =============================================================================
# Networks
# =============================================================================
networks:
  backend:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local